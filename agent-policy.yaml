# agent-policy.yaml for the agent-redline-demo repo.
#
# Generated from agent-redline's spring-archunit extension defaults,
# adapted to this demo's actual package layout (com.example.orders).
#
# Source of truth: agent-redline:demo-source/agent-policy.yaml.
# Regenerate via agent-redline:scripts/sync-demo.sh.
#
# Note on red zones in this demo: the demo has exactly one domain class
# (Order.java), so "src/main/java/**/domain/**" as red is reasonable here
# — the entire domain layer IS the structural surface. Real services with
# many entities should use the narrower spring-archunit defaults
# (domain/repository/*.java, domain/gateway/*.java) and put entities in
# the `watch` list. See extensions/spring-archunit/profile.md and SPEC §4.3.

version: 1

project:
  name: agent-redline-demo
  extension: spring-archunit

zones:
  red:
    - path: src/main/java/**/domain/**
      reason: domain model and invariants
      checkpoint: architecture-review

    - path: src/main/java/**/application/**/port/**
      reason: architectural boundary contracts (port interfaces)
      checkpoint: architecture-review

    - path: src/main/java/**/*Controller.java
      reason: public API contract surface
      checkpoint: api-review

    - path: src/main/resources/db/migration/**
      reason: persistence contract
      checkpoint: persistence-review

    - path: src/test/java/**/architecture/**
      reason: dependency-rule definitions; weakening these requires explicit checkpoint
      checkpoint: architecture-review

  blue:
    - path: src/test/**
      reason: tests and verification (excluding architecture/**)
    - path: src/main/java/**/adapter/**/persistence/**
      reason: persistence adapter implementation; boundary rules ensure callers go through the port

  watch:
    - path: src/main/java/**/application/**/*Service.java
      reason: application services orchestrate flows; changes are common but should be visible

boundaries:
  - id: domain-must-not-import-adapters
    description: Domain layer must not depend on adapter implementations
    from: src/main/java/**/domain/**
    forbidImports:
      - src/main/java/**/adapter/**
    severity: error

  - id: application-must-not-depend-on-persistence-adapters
    description: Application layer talks to ports, not concrete persistence
    from: src/main/java/**/application/**
    forbidImports:
      - src/main/java/**/adapter/**/persistence/**
    severity: error

  - id: controllers-must-not-access-repositories-directly
    description: Controllers go through application services, not directly to data
    from: src/main/java/**/*Controller.java
    forbidImports:
      - src/main/java/**/adapter/**/persistence/**
    severity: error

api:
  type: none
  # Demo has no committed OpenAPI spec. Controller-touch still triggers
  # api-review via the *Controller.java red zone. To enable structural
  # API diffs, add an openapi/api.yaml spec and switch type to
  # openapi-spec-file, or wire SpringDoc and switch to openapi-from-controllers.

persistence:
  migrationPaths:
    - src/main/resources/db/migration/**
  checkpoint: persistence-review

prRules:
  maxChangedFiles:
    warn: 20
    fail: 50
  maxLinesChanged:
    warn: 400
    fail: 1000
  rejectVerboseGeneratedDescriptions: true
  requireVerificationSection: true

checkpoints:
  architecture-review:
    description: Architecture review for structural changes
    satisfiedBy:
      - codeownerApproval
      - label: architecture-reviewed
  api-review:
    description: Public API contract review
    satisfiedBy:
      - codeownerApproval
      - label: api-reviewed
  persistence-review:
    description: Persistence schema / migration review
    satisfiedBy:
      - codeownerApproval
      - label: persistence-reviewed

modes:
  default: shadow
  perCheck:
    boundary_violation: binding
