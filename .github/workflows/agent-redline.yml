name: agent-redline

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  archunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run architecture tests
        run: gradle --no-daemon test --tests '*ArchitectureTest'
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archunit-results
          path: build/test-results/test/

  # OpenAPI worktree dance for api.type=openapi-from-controllers.
  #
  # The reporter is pure: it doesn't run gradle, doesn't build anything.
  # Spec generation is the workflow's job. We check out BASE_SHA and HEAD_SHA
  # in separate worktrees, run the policy's generationCommand in each, and
  # hand both YAMLs to the reporter via --api-spec-base / --api-spec-head.
  #
  # Only runs on pull_request events. On push to main there's no two-SHA
  # comparison to make — `report` will fall back to path-based API detection.
  generate-specs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Resolve BASE / HEAD SHAs
        id: shas
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "base=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"

      - name: Generate spec at BASE
        run: |
          set -euo pipefail
          mkdir -p /tmp/specs
          git worktree add /tmp/spec-base ${{ steps.shas.outputs.base }}
          cd /tmp/spec-base
          # If gradle generation fails at BASE (e.g. controller didn't exist
          # yet), don't fail the whole workflow — emit an empty spec so the
          # reporter sees the head spec as 100% additive.
          if gradle --no-daemon generateOpenApiDocs 2>&1 | tail -20; then
            cp build/openapi.yaml /tmp/specs/api-spec-base.yaml
          else
            echo "BASE spec generation failed; treating as empty spec."
            echo "openapi: 3.0.1" > /tmp/specs/api-spec-base.yaml
            echo "info: { title: empty, version: 0.0.0 }" >> /tmp/specs/api-spec-base.yaml
            echo "paths: {}" >> /tmp/specs/api-spec-base.yaml
          fi
          ls -la /tmp/specs/

      - name: Generate spec at HEAD
        run: |
          set -euo pipefail
          # HEAD is the default checkout; run gradle in place.
          gradle --no-daemon generateOpenApiDocs
          cp build/openapi.yaml /tmp/specs/api-spec-head.yaml
          ls -la /tmp/specs/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-specs
          path: /tmp/specs/

  report:
    runs-on: ubuntu-latest
    needs: [archunit, generate-specs]
    # Run regardless of upstream — generate-specs is skipped on push events
    # (no PR to compare against), and we still want the reporter to post for
    # archunit failures.
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install reporter dependencies
        run: pip install pyyaml

      - name: Download ArchUnit results
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: archunit-results
          path: build/test-results/test/
        continue-on-error: true

      - name: Download API specs
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: api-specs
          path: /tmp/specs/
        continue-on-error: true

      - name: Compute diff inputs
        id: diff
        run: |
          # ar-test-block: compute-diff-inputs
          set -euo pipefail
          ZERO="0000000000000000000000000000000000000000"
          if [[ "${GITHUB_EVENT_NAME:-${{ github.event_name }}}" == "pull_request" ]]; then
            BASE_SHA="${AR_PR_BASE_SHA:-${{ github.event.pull_request.base.sha }}}"
            HEAD_SHA="${AR_PR_HEAD_SHA:-${{ github.event.pull_request.head.sha }}}"
          else
            BASE_SHA="${AR_BEFORE_SHA:-${{ github.event.before }}}"
            HEAD_SHA="${AR_GH_SHA:-${{ github.sha }}}"
          fi

          # On the first push to a branch (or after a force-push that wiped
          # the previous commit), BASE_SHA may be all-zeros, empty, or refer
          # to a commit that no longer exists in the remote. In any of those
          # cases, fall back to the empty tree so the diff covers everything.
          if [[ "$BASE_SHA" == "$ZERO" || -z "$BASE_SHA" ]] \
             || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "BASE_SHA $BASE_SHA not present locally; using empty tree."
            BASE_SHA=$(git hash-object -t tree /dev/null)
          fi

          OUT_DIR="${AR_OUT_DIR:-/tmp/agent-redline}"
          mkdir -p "$OUT_DIR"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > "$OUT_DIR/changed-files.txt"
          ADD=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" | grep -oE '[0-9]+ insertion' | head -1 | grep -oE '[0-9]+' || echo 0)
          DEL=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" | grep -oE '[0-9]+ deletion' | head -1 | grep -oE '[0-9]+' || echo 0)
          LINES_CHANGED=$((ADD + DEL))
          echo "lines_changed=$LINES_CHANGED" >> "${GITHUB_OUTPUT:-/dev/null}"
          echo "lines_changed=$LINES_CHANGED" > "$OUT_DIR/lines-changed.txt"
          echo "Changed files:"
          cat "$OUT_DIR/changed-files.txt"
          # ar-test-block-end: compute-diff-inputs

      - name: Run reporter
        id: report
        run: |
          set -euo pipefail
          ARCHUNIT_ARG=""
          if compgen -G "build/test-results/test/TEST-*ArchitectureTest*.xml" > /dev/null; then
            ARCHUNIT_ARG="--archunit-xml $(ls build/test-results/test/TEST-*ArchitectureTest*.xml | head -1)"
          fi
          API_ARGS=""
          if [[ -f /tmp/specs/api-spec-base.yaml && -f /tmp/specs/api-spec-head.yaml ]]; then
            API_ARGS="--api-spec-base /tmp/specs/api-spec-base.yaml --api-spec-head /tmp/specs/api-spec-head.yaml"
            echo "OpenAPI specs available for diff:"
            ls -la /tmp/specs/
          else
            echo "OpenAPI specs not available; reporter will use path-based API detection only."
          fi
          LABELS=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS=$(echo '${{ toJSON(github.event.pull_request.labels) }}' | python -c "import sys, json; print(','.join(l['name'] for l in json.load(sys.stdin)))")
          fi
          python scripts/agent-redline-report.py \
            --policy agent-policy.yaml \
            --changed-files /tmp/agent-redline/changed-files.txt \
            --lines-changed ${{ steps.diff.outputs.lines_changed }} \
            --mode shadow \
            --pr-labels "$LABELS" \
            $ARCHUNIT_ARG \
            $API_ARGS \
            --json-out /tmp/agent-redline/verdict.json \
            --comment-out /tmp/agent-redline/comment.md \
            || echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          echo "--- verdict.json ---"
          cat /tmp/agent-redline/verdict.json
          echo "--- comment.md ---"
          cat /tmp/agent-redline/comment.md

      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: agent-redline
          path: /tmp/agent-redline/comment.md
